<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Notepad Sharing</title>
  <script>
    (function() {
      var loc = window.location;

      // Jika URL sudah mengandung parameter redirect, jangan diproses lagi
      if (loc.search.includes('redirect=')) {
        // Pertahankan search & hash, cukup arahkan ke root
        loc.replace('/' + loc.search + loc.hash);
        return;
      }

      // Untuk path biasa (misal /n/abc123), encode sebagai redirect
      var path = loc.pathname;
      loc.replace('/?redirect=' + encodeURIComponent(path + loc.search) + loc.hash);
    })();
  </script>
</head>
<body>
  Mengalihkan…
</body>
</html>
