<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Notepad Sharing</title>
  <script>
    // GitHub Pages SPA redirect trick.
    // GitHub Pages serves this file for any unknown path (e.g. /notepad_frontend/n/abc123).
    // We encode the real path into the querystring and redirect to index.html,
    // then a small script in index.html restores it before Alpine's handleShareLink() runs.

    var repoPath = '/notepad_frontend'; // <-- ganti kalau nama repo kamu beda
    var loc = window.location;
    var path = loc.pathname.slice(repoPath.length); // sisa path setelah nama repo, misal "/n/abc123"

    loc.replace(
      repoPath + '/?redirect=' + encodeURIComponent(path + loc.search) + loc.hash
    );
  </script>
</head>
<body>
  Mengalihkan…
</body>
</html>
